name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
